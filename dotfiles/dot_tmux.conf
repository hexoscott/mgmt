# Prefixes
unbind C-b
set-option -g prefix C-a
set-option -g prefix2 '`'
bind-key C-a send-prefix
bind-key '`' send-prefix -2
bind-key -n § switch-client -T prefix
bind-key § send-keys §

# Indexes and session behavior
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on
set-option -g detach-on-destroy off
set-option -g set-titles on
set-option -g set-titles-string '#S:#I:#W'

# Input and terminal behavior
set -g mouse on
set -g history-limit 102400
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
set -s extended-keys on
set -s extended-keys-format csi-u
setw -g xterm-keys on

# Panes
setw -g pane-border-lines double
setw -g pane-border-status top
setw -g pane-border-format '#[fg=#565f89,bg=#11131a] #{?pane_active,ACTIVE ,}#{pane_index} #{pane_current_command} '
set -g pane-border-style 'fg=#3b4255,bg=#11131a'
set -g pane-active-border-style 'fg=#7aa2f7,bg=#11131a'

# Top-centered workspace bar
set-option -g status on
set-option -g status-position top
set-option -g status-interval 5
set-option -g status-justify centre
set-option -g status-style 'bg=#11131a,fg=#c0caf5'
set-option -g status-left-length 30
set-option -g status-right-length 80
set-option -g status-left '#[fg=#11131a,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#11131a] '
set-option -g status-right '#[fg=#e0af68,bg=#11131a,bold]#{?window_zoomed_flag, ZOOM ,}#[fg=#565f89,bg=#11131a,nobold]%Y-%m-%d #[fg=#7dcfff]%H:%M '
setw -g window-status-separator '#[fg=#3b4255,bg=#11131a] | '
setw -g window-status-format '#[fg=#565f89,bg=#11131a]  #I:#W  '
setw -g window-status-current-format '#[fg=#11131a,bg=#bb9af7,bold]  #{?window_zoomed_flag,ZOOM ,}#I:#W  '
setw -g window-status-activity-style 'fg=#e0af68,bg=#11131a'

# Reload config
bind r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'

# Vim-style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# No-prefix pane movement
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# No-prefix workspace movement
bind -n M-[ previous-window
bind -n M-] next-window
bind -n M-p previous-window
bind -n M-n next-window

# Splits keep the current directory.
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Quick workspace navigation
bind Space choose-tree -Zw
bind Tab last-window
bind z resize-pane -Z \; display-message '#{?window_zoomed_flag,zoomed pane,restored panes}'

# macOS clipboard-friendly copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'
